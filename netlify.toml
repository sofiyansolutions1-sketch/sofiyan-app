[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  CI = "false"
  NODE_OPTIONS = "--max_old_space_size=4096"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["vite"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/influencer-portal"
  to = "/influencer-portal.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200