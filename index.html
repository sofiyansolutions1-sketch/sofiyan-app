    <script>
      window.calculateWordMatchScore = function (searchQuery, partnerString) {
        if (!searchQuery || !partnerString) return 0;

        const stopWords = ["and", "the", "for", "with", "from", "that", "this"];
        const queryWords = searchQuery
          .toLowerCase()
          .replace(/[^a-z0-9\s]/g, "")
          .split(/\s+/)
          .filter((w) => w.length > 2 && !stopWords.includes(w));

        const targetString = partnerString
          .toLowerCase()
          .replace(/[^a-z0-9\s]/g, "");

        let score = 0;
        queryWords.forEach((word) => {
          if (targetString.includes(word)) score += 1;
        });
        return score;
      };

      window.openMatchModal = function (leadId, leadDataEncoded) {
        const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
        document.getElementById("match-lead-id").value = leadId;
        document.getElementById("match-lead-data").value = leadDataEncoded;

        const fullCustAddress = `${lead.customer_address || lead.address || ""} ${lead.city || ""} ${lead.pincode || ""}`;
        document.getElementById("match-customer-address").innerText =
          `Customer: ${fullCustAddress}`;

        // Auto-fill search bar with customer's city as default starting point
        document.getElementById("live-keyword-search").value = lead.city || "";

        document.getElementById("text-match-modal").classList.remove("hidden");
        runKeywordMatch();
      };

      window.closeMatchModal = () =>
        document.getElementById("text-match-modal").classList.add("hidden");

      window.runKeywordMatch = async function () {
        const resultsDiv = document.getElementById("match-results");
        const loadingDiv = document.getElementById("match-loading");
        const liveSearchText = document
          .getElementById("live-keyword-search")
          .value.trim();

        const leadDataEncoded =
          document.getElementById("match-lead-data").value;
        const lead = JSON.parse(decodeURIComponent(leadDataEncoded));

        // Search Query: liveSearchText or fallback to customer address
        const queryToMatch =
          liveSearchText.length > 0
            ? liveSearchText
            : `${lead.customer_address || ""} ${lead.city || ""} ${lead.pincode || ""}`;

        resultsDiv.innerHTML = "";
        loadingDiv.classList.remove("hidden");

        try {
          // Fetch Primary Partners
          const primaryResponse = await window.supabase
            .from("primary_partners")
            .select("*")
            .eq("status", "available");

          if (primaryResponse.error) throw primaryResponse.error;

          // Map and Combine
          const allPartners = (primaryResponse.data || []).map((p) => ({
            ...p,
            display_name:
              `${p.first_name || ""} ${p.last_name || ""}`.trim() || p.name,
            partner_type: "Primary",
          }));

          let qualifiedPartners = [];

          // Matching
          allPartners.forEach((p) => {
            // Combine city, address, pincode for searching
            const partnerSearchableString = `${p.address || ""} ${p.city || ""} ${p.pincode || ""}`;

            let matchScore = window.calculateWordMatchScore(
              queryToMatch,
              partnerSearchableString,
            );

            // Bonus for exact city match
            const leadCity = (lead.city || "").toLowerCase();
            const searchCity = liveSearchText.toLowerCase();

            if (
              (searchCity &&
                p.city &&
                p.city.toLowerCase().includes(searchCity)) ||
              (!searchCity &&
                leadCity &&
                p.city &&
                p.city.toLowerCase().includes(leadCity))
            ) {
              matchScore += 10;
            }

            if (matchScore > 0) {
              p.match_score = matchScore;
              qualifiedPartners.push(p);
            }
          });

          // Filter & Sort
          qualifiedPartners.sort((a, b) => b.match_score - a.match_score);

          loadingDiv.classList.add("hidden");

          // Render Empty State
          if (qualifiedPartners.length === 0) {
            resultsDiv.innerHTML =
              '<p class="text-gray-500 text-sm p-4 text-center font-bold">No partners found matching those keywords.</p>';
            return;
          }

          // Render Results
          qualifiedPartners.forEach((p) => {
            let badge =
              '<span class="bg-indigo-100 text-indigo-800 text-[10px] font-black px-2.5 py-1 rounded uppercase border border-indigo-200 tracking-wider"><i class="fas fa-star text-yellow-500 mr-1"></i> Partner</span>';

            let safePartnerName = p.display_name.replace(/'/g, "\\'");
            let servicesDisplay =
              p.categories && Array.isArray(p.categories)
                ? p.categories.join(", ")
                : "Generalist";

            resultsDiv.innerHTML += `
                  <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-indigo-300 transition-colors group">
                      <div class="flex justify-between items-start">
                          <div>
                              <div class="flex items-center space-x-2">
                                  <h4 class="font-bold text-gray-900 text-lg">${p.display_name}</h4>
                                  ${badge}
                              </div>
                              <p class="text-xs text-gray-600 mt-1.5"><i class="fas fa-map-marker-alt text-red-500 mr-1.5"></i> ${p.address || ""}, ${p.city || ""} - ${p.pincode || ""}</p>
                              <p class="text-xs text-gray-500 mt-2"><b>Services:</b> ${servicesDisplay}</p>
                          </div>
                          <div class="text-center bg-indigo-50 border border-indigo-100 p-2 rounded-lg">
                              <p class="text-[10px] font-black text-indigo-700 uppercase">Match Score</p>
                              <p class="text-3xl font-black text-indigo-900">${p.match_score}</p>
                          </div>
                      </div>
                      <button onclick="assignPartnerToLead('${lead.id}', '${p.id}', '${safePartnerName}', '${p.phone || ""}')" class="w-full mt-4 bg-green-500 text-white font-bold py-2.5 rounded-lg text-sm hover:bg-green-600 transition shadow-sm group-hover:shadow-lg flex items-center justify-center">
                          <i class="fab fa-whatsapp mr-2 text-base"></i> Assign & Send Details
                      </button>
                  </div>`;
          });
        } catch (e) {
          console.error(e);
          loadingDiv.classList.add("hidden");
          resultsDiv.innerHTML =
            '<p class="text-red-500 text-sm p-4 text-center">Error loading partners.</p>';
        }
      };

      let currentCategoryView = "";

      window.syncVanillaCartUI = function () {
        window.updateCartBadge();
        if (currentCategoryView) {
          const content = document.getElementById("full-modal-services-content");
          const scrollPos = content ? content.scrollTop : 0;
          window.openCategoryView(currentCategoryView);
          if (content) content.scrollTop = scrollPos;
        }
      };

      window.renderCartSidebar = function () {
        // React cart UI uses openReactCheckout directly
      };

      window.updateCartBadge = function () {
        if (window.getReactCart) {
          const cart = window.getReactCart();
          const count = cart.reduce((acc, item) => acc + item.quantity, 0);
          const totalPrice = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
          const badge = document.getElementById("full-modal-cart-count");
          const bottomBar = document.getElementById("full-modal-bottom-bar");
          const totalItemsSpan = document.getElementById("full-modal-total-items");
          const totalPriceSpan = document.getElementById("full-modal-total-price");
          
          if (badge) {
            badge.innerText = count;
            if (count > 0) badge.classList.remove("hidden");
            else badge.classList.add("hidden");
          }
          
          if (bottomBar) {
            if (count > 0) {
              bottomBar.classList.remove("hidden");
              if (totalItemsSpan) totalItemsSpan.innerText = count + (count === 1 ? " item" : " items");
              if (totalPriceSpan) totalPriceSpan.innerText = "₹" + totalPrice;
            } else {
              bottomBar.classList.add("hidden");
            }
          }
        }
      };

      window.proceedToCheckout = function() {
        window.closeCategoryView();
        if (window.openReactCheckout) {
          window.openReactCheckout();
        }
      };

      window.increaseQty = function (id, price, name, categoryName) {
        if (window.getReactCart) {
          const cart = window.getReactCart();
          const item = cart.find((i) => i.id === id);
          if (item) {
            window.updateReactCartQuantity(id, 1);
          } else {
            window.addServiceToCart(id, name, price, categoryName);
          }
        }
      };

      window.decreaseQty = function (id, price, name, categoryName) {
        if (window.updateReactCartQuantity) {
          window.updateReactCartQuantity(id, -1);
        }
      };

      window.closeCategoryView = function () {
        const modal = document.getElementById("full-service-modal");
        if (modal) {
          modal.classList.add("hidden");
          modal.classList.remove("flex");
        }
        document.body.style.overflow = "";
        currentCategoryView = "";
      };

      window.openCategoryView = function (categoryName) {
        currentCategoryView = categoryName;
        const modal = document.getElementById("full-service-modal");
        const title = document.getElementById("full-modal-title");
        const sidebar = document.getElementById("full-modal-sidebar");
        const content = document.getElementById("full-modal-services-content");

        if (modal) {
          modal.classList.remove("hidden");
          modal.classList.add("flex");
        }
        document.body.style.overflow = "hidden";

        window.updateCartBadge();

        title.textContent = categoryName;
        sidebar.innerHTML = "";
        content.innerHTML = "";

        const categoryData =
          window.masterServicesData[categoryName] ||
          window.masterServicesData["Electrician"];
        const subcategories = Object.keys(categoryData);

        if (subcategories.length === 0) return;

        // Render Sidebar
        subcategories.forEach((subcat, index) => {
          const btn = document.createElement("button");
          // Responsive classes: flex-shrink-0 for mobile horizontal scroll, w-full for desktop vertical list
          btn.className = `flex-shrink-0 md:w-full text-left px-5 py-4 border-b-2 md:border-b-0 md:border-r-0 border-transparent text-sm font-bold transition-all whitespace-nowrap md:whitespace-normal duration-300 ${index === 0 ? "bg-indigo-50/50 text-indigo-700 border-indigo-600 md:border-l-4" : "text-slate-500 hover:bg-slate-50 md:border-l-4 md:border-l-transparent"}`;
          btn.textContent = subcat;
          btn.onclick = () => {
            // Update active state
            Array.from(sidebar.children).forEach((c) => {
              c.className =
                "flex-shrink-0 md:w-full text-left px-5 py-4 border-b-2 md:border-b-0 md:border-r-0 border-transparent text-sm font-bold transition-all whitespace-nowrap md:whitespace-normal duration-300 text-slate-500 hover:bg-slate-50 md:border-l-4 md:border-l-transparent";
            });
            btn.className =
              "flex-shrink-0 md:w-full text-left px-5 py-4 border-b-2 md:border-b-0 md:border-r-0 border-indigo-600 text-indigo-700 transition-all whitespace-nowrap md:whitespace-normal duration-300 bg-indigo-50/50 md:border-l-4";

            // Scroll to section
            const section = document.getElementById(
              `section-${subcat.replace(/\s+/g, "-")}`,
            );
            if (section) {
              content.scrollTo({
                top: section.offsetTop - content.offsetTop,
                behavior: "smooth",
              });
            }
          };
          sidebar.appendChild(btn);
        });

        // Render Content
        subcategories.forEach((subcat) => {
          const section = document.createElement("div");
          section.id = `section-${subcat.replace(/\s+/g, "-")}`;
          section.className = "mb-10";

          const sectionTitle = document.createElement("div");
          sectionTitle.className =
            "sticky top-0 bg-white/80 backdrop-blur-md py-3 px-4 -mx-4 mb-4 z-10 border-b border-slate-100 flex items-center gap-2";
          sectionTitle.innerHTML = `<div class="w-1.5 h-5 bg-indigo-600 rounded-full"></div><h3 class="font-black text-slate-900 uppercase tracking-tight">${subcat}</h3>`;
          section.appendChild(sectionTitle);

          const servicesList = document.createElement("div");
          servicesList.className = "grid grid-cols-1 gap-4";

          categoryData[subcat].forEach((service, index) => {
            // Generate a unique ID if not present
            const serviceId =
              service.id ||
              `${categoryName}-${subcat}-${service.name}`
                .replace(/[^a-zA-Z0-9]/g, "-")
                .toLowerCase();

            let qty = 0;
            if (window.getReactCart) {
              const reactCart = window.getReactCart();
              const item = reactCart.find((i) => i.id === serviceId);
              if (item) qty = item.quantity;
            }

            const card = document.createElement("div");
            card.className =
              "relative bg-white rounded-2xl p-5 shadow-sm border border-slate-100 hover:shadow-md transition-all flex justify-between items-center group overflow-hidden";

            // Add pseudo-random badge
            const hasBadge = (index + subcat.length) % 3 === 0;
            const badgeHtml = hasBadge
              ? `<div class="absolute top-0 left-0 bg-gradient-to-r from-amber-400 to-orange-500 text-white text-[9px] font-black px-2 py-0.5 rounded-br-lg shadow-sm z-[5]">⭐ BESTSELLER</div>`
              : "";

            const originalPrice = Math.round(service.price * 1.35);
            const discount = 26;

            let buttonHtml = "";
            if (qty > 0) {
              buttonHtml = `
                          <div class="flex items-center bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200 overflow-hidden h-11 ring-2 ring-indigo-50">
                              <button onclick="decreaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="w-9 h-full flex items-center justify-center text-white font-black hover:bg-indigo-700 transition-colors">-</button>
                              <span class="w-8 text-center font-black text-white text-sm flex items-center justify-center">${qty}</span>
                              <button onclick="increaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="w-9 h-full flex items-center justify-center text-white font-black hover:bg-indigo-700 transition-colors">+</button>
                          </div>
                      `;
            } else {
              buttonHtml = `
                          <button onclick="increaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="px-7 py-2.5 bg-white border-2 border-indigo-100 text-indigo-700 font-black rounded-xl hover:border-indigo-600 hover:bg-indigo-50 shadow-sm transition-all h-11 uppercase text-xs tracking-wider">
                              ADD
                          </button>
                      `;
            }

            card.innerHTML = `
                      ${badgeHtml}
                      <div class="flex-1 pr-4">
                          <h4 class="font-black text-slate-900 text-base leading-tight mb-1 group-hover:text-indigo-600 transition-colors">${service.name}</h4>
                          <div class="flex items-center gap-2 mt-2">
                              <span class="font-black text-xl text-slate-900">₹${service.price}</span>
                              <span class="text-xs text-slate-400 line-through">₹${originalPrice}</span>
                              <span class="bg-green-50 text-green-600 text-[10px] font-black px-1.5 py-0.5 rounded border border-green-100 uppercase tracking-tighter">${discount}% OFF</span>
                          </div>
                          <p class="text-[10px] text-slate-400 mt-2 flex items-center gap-1 font-medium"><i class="fas fa-history text-[8px] text-indigo-400"></i> Takes approx. 45-60 mins</p>
                      </div>
                      <div class="flex-shrink-0">
                          ${buttonHtml}
                      </div>
                  `;
            servicesList.appendChild(card);
          });

          section.appendChild(servicesList);
          content.appendChild(section);
        });

      };
    </script>
