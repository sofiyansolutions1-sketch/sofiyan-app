    <script>
      window.calculateWordMatchScore = function(searchQuery, partnerString) {
          if (!searchQuery || !partnerString) return 0;
          
          const stopWords = ['and', 'the', 'for', 'with', 'from', 'that', 'this'];
          const queryWords = searchQuery.toLowerCase()
              .replace(/[^a-z0-9\s]/g, '')
              .split(/\s+/)
              .filter(w => w.length > 2 && !stopWords.includes(w));
              
          const targetString = partnerString.toLowerCase().replace(/[^a-z0-9\s]/g, '');
          
          let score = 0;
          queryWords.forEach(word => {
              if (targetString.includes(word)) score += 1;
          });
          return score;
      };

      window.openMatchModal = function(leadId, leadDataEncoded) {
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          document.getElementById('match-lead-id').value = leadId;
          document.getElementById('match-lead-data').value = leadDataEncoded;
          
          const fullCustAddress = `${lead.customer_address || lead.address || ''} ${lead.city || ''} ${lead.pincode || ''}`;
          document.getElementById('match-customer-address').innerText = `Customer: ${fullCustAddress}`;
          
          // Auto-fill search bar with customer's city as default starting point
          document.getElementById('live-keyword-search').value = lead.city || '';
          
          document.getElementById('text-match-modal').classList.remove('hidden');
          runKeywordMatch();
      };

      window.closeMatchModal = () => document.getElementById('text-match-modal').classList.add('hidden');

      window.runKeywordMatch = async function() {
          const resultsDiv = document.getElementById('match-results');
          const loadingDiv = document.getElementById('match-loading');
          const liveSearchText = document.getElementById('live-keyword-search').value.trim();
          
          const leadDataEncoded = document.getElementById('match-lead-data').value;
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          
          // Search Query: liveSearchText or fallback to customer address
          const queryToMatch = liveSearchText.length > 0 
              ? liveSearchText 
              : `${lead.customer_address || ''} ${lead.city || ''} ${lead.pincode || ''}`;

          resultsDiv.innerHTML = '';
          loadingDiv.classList.remove('hidden');

          try {
              // Fetch Primary and Secondary Partners
              const [primaryResponse, secondaryResponse] = await Promise.all([
                  window.supabase.from('primary_partners').select('*').eq('status', 'available'),
                  window.supabase.from('secondary_partners').select('*').eq('status', 'available')
              ]);
              
              if (primaryResponse.error) throw primaryResponse.error;
              if (secondaryResponse.error) throw secondaryResponse.error;

              // Map and Combine
              const primaryPartners = (primaryResponse.data || []).map(p => ({
                  ...p,
                  display_name: `${p.first_name} ${p.last_name || ''}`.trim(),
                  partner_type: 'Primary'
              }));

              const secondaryPartners = (secondaryResponse.data || []).map(p => ({
                  ...p,
                  display_name: p.name || 'Unknown',
                  partner_type: 'Secondary'
              }));

              const allPartners = [...primaryPartners, ...secondaryPartners];
              let qualifiedPartners = [];

              // Matching
              allPartners.forEach(p => {
                  // Combine city, address, pincode for searching
                  const partnerSearchableString = `${p.address || ''} ${p.city || ''} ${p.pincode || ''}`;
                  
                  let matchScore = window.calculateWordMatchScore(queryToMatch, partnerSearchableString);

                  // Bonus for exact city match
                  const leadCity = (lead.city || '').toLowerCase();
                  const searchCity = liveSearchText.toLowerCase();
                  
                  if((searchCity && p.city && p.city.toLowerCase().includes(searchCity)) || 
                     (!searchCity && leadCity && p.city && p.city.toLowerCase().includes(leadCity))) {
                      matchScore += 10; 
                  }

                  if (matchScore > 0) {
                      p.match_score = matchScore;
                      qualifiedPartners.push(p);
                  }
              });

              // Filter & Sort
              qualifiedPartners.sort((a, b) => {
                  if (b.match_score !== a.match_score) return b.match_score - a.match_score;
                  if (a.partner_type === 'Primary' && b.partner_type !== 'Primary') return -1;
                  if (a.partner_type !== 'Primary' && b.partner_type === 'Primary') return 1;
                  return 0;
              });

              loadingDiv.classList.add('hidden');

              // Render Empty State
              if (qualifiedPartners.length === 0) {
                  resultsDiv.innerHTML = '<p class="text-gray-500 text-sm p-4 text-center font-bold">No partners found matching those keywords.</p>';
                  return;
              }

              // Render Results
              qualifiedPartners.forEach(p => {
                  let badge = p.partner_type === 'Primary' 
                      ? '<span class="bg-indigo-100 text-indigo-800 text-[10px] font-black px-2.5 py-1 rounded uppercase border border-indigo-200 tracking-wider"><i class="fas fa-star text-yellow-500 mr-1"></i> Primary</span>'
                      : '<span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2.5 py-1 rounded uppercase border border-gray-200 tracking-wider">Secondary</span>';

                  let safePartnerName = p.display_name.replace(/'/g, "\\'");
                  let servicesDisplay = (p.categories && Array.isArray(p.categories)) ? p.categories.join(', ') : 'Generalist';

                  resultsDiv.innerHTML += `
                  <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-indigo-300 transition-colors group">
                      <div class="flex justify-between items-start">
                          <div>
                              <div class="flex items-center space-x-2">
                                  <h4 class="font-bold text-gray-900 text-lg">${p.display_name}</h4>
                                  ${badge}
                              </div>
                              <p class="text-xs text-gray-600 mt-1.5"><i class="fas fa-map-marker-alt text-red-500 mr-1.5"></i> ${p.address || ''}, ${p.city || ''} - ${p.pincode || ''}</p>
                              <p class="text-xs text-gray-500 mt-2"><b>Services:</b> ${servicesDisplay}</p>
                          </div>
                          <div class="text-center bg-indigo-50 border border-indigo-100 p-2 rounded-lg">
                              <p class="text-[10px] font-black text-indigo-700 uppercase">Match Score</p>
                              <p class="text-3xl font-black text-indigo-900">${p.match_score}</p>
                          </div>
                      </div>
                      <button onclick="assignPartnerToLead('${lead.id}', '${p.id}', '${safePartnerName}', '${p.phone || ''}')" class="w-full mt-4 bg-green-500 text-white font-bold py-2.5 rounded-lg text-sm hover:bg-green-600 transition shadow-sm group-hover:shadow-lg flex items-center justify-center">
                          <i class="fab fa-whatsapp mr-2 text-base"></i> Assign & Send Details
                      </button>
                  </div>`;
              });

          } catch (e) {
              console.error(e);
              loadingDiv.classList.add('hidden');
              resultsDiv.innerHTML = '<p class="text-red-500 text-sm p-4 text-center">Error loading partners.</p>';
          }
      };

      let locationSearchTimeout = null;

      window.handleLocationSearch = function(query) {
          clearTimeout(locationSearchTimeout);
          const suggestionsBox = document.getElementById('location-suggestions');
          
          if (!query || query.length < 3) {
              suggestionsBox.classList.add('hidden');
              return;
          }

          // Show loading text
          suggestionsBox.innerHTML = '<div class="p-3 text-sm text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Searching...</div>';
          suggestionsBox.classList.remove('hidden');

          // Debounce for 500ms
          locationSearchTimeout = setTimeout(async () => {
              try {
                  // Restrict to India (countrycodes=in)
                  const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=in&limit=5&addressdetails=1`);
                  const data = await response.json();
                  
                  suggestionsBox.innerHTML = '';
                  
                  if (data.length === 0) {
                      suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">No results found</div>';
                      return;
                  }

                  data.forEach(place => {
                      // Make the address look cleaner
                      const cleanAddress = place.display_name.split(',').slice(0, 3).join(', ');
                      
                      const div = document.createElement('div');
                      div.className = "p-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 flex items-start space-x-2 transition";
                      div.innerHTML = `
                          <i class="fas fa-map-pin text-gray-400 mt-1"></i>
                          <div>
                              <p class="text-sm font-bold text-gray-800">${place.name || place.display_name.split(',')[0]}</p>
                              <p class="text-xs text-gray-500">${cleanAddress}</p>
                          </div>
                      `;
                      div.onclick = () => selectLocation(cleanAddress);
                      suggestionsBox.appendChild(div);
                  });
              } catch (error) {
                  console.error("Search Error:", error);
                  suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">Error fetching results.</div>';
              }
          }, 500);
      };

      window.selectLocation = function(addressText) {
          // 1. Update the Header UI
          const headerDisplay = document.getElementById('header-location-display');
          if(headerDisplay) headerDisplay.innerText = addressText.split(',')[0];
          
          // 2. ONLY update the CITY input in the checkout form (extract city name)
          const cityInput = document.getElementById('checkout-city'); // Ensure this ID matches your City input
          if(cityInput) {
              // We use the native setter to ensure React picks up the change if it's a controlled component
              const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
              nativeInputValueSetter.call(cityInput, addressText.split(',')[0]);
              cityInput.dispatchEvent(new Event('input', { bubbles: true }));
          }
          
          // Also update session storage and dispatch event for React to pick up
          sessionStorage.setItem('userLocation', addressText);
          window.dispatchEvent(new Event('locationUpdated'));
          
          // 3. Clear the search and close modal
          document.getElementById('location-search-input').value = '';
          document.getElementById('location-suggestions').classList.add('hidden');
          closeLocationModal();
      };

      window.autoDetectGPS = function() {
          const btnText = document.querySelector('button[onclick="autoDetectGPS()"] h4');
          const originalText = btnText.innerText;
          btnText.innerHTML = 'Locating... <i class="fas fa-spinner fa-spin ml-2"></i>';
          
          if (!navigator.geolocation) {
              alert("Your browser doesn't support GPS location.");
              btnText.innerText = originalText;
              return;
          }

          navigator.geolocation.getCurrentPosition(
              async (position) => {
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;
                  
                  try {
                      // Reverse geocode to get the text address
                      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                      const data = await response.json();
                      
                      const cleanAddress = data.display_name.split(',').slice(0, 3).join(', ');
                      selectLocation(cleanAddress);
                      
                  } catch (error) {
                      alert("Could not fetch address details for your location.");
                      btnText.innerText = originalText;
                  }
              },
              (error) => {
                  console.error("GPS Error:", error);
                  let msg = "Location error.";
                  if (error.code === 1) msg = "You denied location permission. Please allow it in your browser settings.";
                  if (error.code === 2) msg = "Location unavailable. Check your device GPS.";
                  if (error.code === 3) msg = "Request timed out.";
                  alert(msg);
                  btnText.innerText = originalText;
              },
              { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
      };

      window.renderCleaningModal = function() {
          const categoriesList = document.getElementById('cleaning-categories-list');
          const servicesContainer = document.getElementById('cleaning-services-inner');
          
          categoriesList.innerHTML = '';
          servicesContainer.innerHTML = '';
          
          Object.keys(cleaningServicesData).forEach((category, index) => {
              const categoryId = `clean-cat-${index}`;
              
              // Render Sidebar/Tab Item
              const btn = document.createElement('button');
              btn.className = `cleaning-cat-btn text-left px-4 py-3 md:py-4 rounded-lg md:rounded-xl text-sm md:text-base font-medium transition-all flex-shrink-0 ${index === 0 ? 'bg-indigo-50 text-indigo-700 font-bold border-b-2 md:border-b-0 md:border-l-4 border-indigo-600' : 'text-gray-600 hover:bg-gray-100'}`;
              btn.innerText = category;
              btn.dataset.target = categoryId;
              btn.onclick = () => window.scrollCleaningToCategory(categoryId, btn);
              categoriesList.appendChild(btn);
              
              // Render Services Section
              const section = document.createElement('div');
              section.id = categoryId;
              section.className = 'cleaning-section pt-4 md:pt-8 first:pt-0';
              
              let servicesHtml = `<h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-4 md:mb-6">${category}</h3><div class="space-y-4 md:space-y-6">`;
              
              cleaningServicesData[category].forEach(service => {
                  servicesHtml += `
                  <div class="flex justify-between items-center p-4 md:p-5 bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                      <div class="pr-4">
                          <h4 class="font-bold text-gray-800 text-base md:text-lg">${service.name}</h4>
                          <div class="flex items-center gap-2 mt-1 md:mt-2">
                              <span class="font-bold text-gray-900">₹${service.price}</span>
                              <span class="text-xs text-gray-500 line-through">₹${Math.round(service.price * 1.2)}</span>
                              <span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded">20% OFF</span>
                          </div>
                      </div>
                      <button onclick="addCleaningServiceToCart(event, '${service.id}', '${service.name.replace(/'/g, "\\'")}', ${service.price}, '${category.replace(/'/g, "\\'")}')" class="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-600 hover:text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-sm">
                          Add
                      </button>
                  </div>`;
              });
              
              servicesHtml += `</div>`;
              section.innerHTML = servicesHtml;
              servicesContainer.appendChild(section);
          });
          
          // Setup ScrollSpy
          document.getElementById('cleaning-services-container').addEventListener('scroll', window.handleCleaningScrollSpy);
      };

      window.scrollCleaningToCategory = function(id, btn) {
          isCleaningScrolling = true;
          window.updateActiveCleaningCategoryBtn(btn);
          
          const target = document.getElementById(id);
          const container = document.getElementById('cleaning-services-container');
          
          // Scroll to element
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          
          // Reset isScrolling after animation
          setTimeout(() => { isCleaningScrolling = false; }, 800);
      };

      window.handleCleaningScrollSpy = function() {
          if (isCleaningScrolling) return;
          
          const container = document.getElementById('cleaning-services-container');
          const sections = document.querySelectorAll('.cleaning-section');
          const scrollPosition = container.scrollTop + 100; // Offset
          
          let currentActiveId = null;
          
          sections.forEach(section => {
              if (section.offsetTop <= scrollPosition) {
                  currentActiveId = section.id;
              }
          });
          
          if (currentActiveId) {
              const activeBtn = document.querySelector(`.cleaning-cat-btn[data-target="${currentActiveId}"]`);
              if (activeBtn) window.updateActiveCleaningCategoryBtn(activeBtn);
          }
      };

      window.updateActiveCleaningCategoryBtn = function(activeBtn) {
          document.querySelectorAll('.cleaning-cat-btn').forEach(btn => {
              btn.className = 'cleaning-cat-btn text-left px-4 py-3 md:py-4 rounded-lg md:rounded-xl text-sm md:text-base font-medium transition-all flex-shrink-0 text-gray-600 hover:bg-gray-100';
          });
          activeBtn.className = 'cleaning-cat-btn text-left px-4 py-3 md:py-4 rounded-lg md:rounded-xl text-sm md:text-base font-medium transition-all flex-shrink-0 bg-indigo-50 text-indigo-700 font-bold border-b-2 md:border-b-0 md:border-l-4 border-indigo-600';
          
          // Scroll tab bar on mobile to keep active item in view
          activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      };

      window.openCleaningModal = function() {
          const modal = document.getElementById('uc-cleaning-modal');
          modal.classList.remove('hidden');
          // Trigger reflow
          void modal.offsetWidth;
          modal.classList.remove('translate-y-full');
          modal.classList.add('translate-y-0');
          
          if (document.getElementById('cleaning-categories-list').children.length === 0) {
              window.renderCleaningModal();
          }
      };

      window.closeCleaningModal = function() {
          const modal = document.getElementById('uc-cleaning-modal');
          modal.classList.remove('translate-y-0');
          modal.classList.add('translate-y-full');
          setTimeout(() => {
              modal.classList.add('hidden');
          }, 300); // Match transition duration
      };

      window.addCleaningServiceToCart = function(event, id, name, price, category) {
          if (window.addServiceToCart) {
              window.addServiceToCart(id, name, price, category);
              
              // Optional: Show a small toast or animation
              const btn = event.currentTarget;
              const originalText = btn.innerText;
              btn.innerText = 'Added!';
              btn.classList.add('bg-green-500', 'text-white', 'border-green-500');
              btn.classList.remove('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
              
              setTimeout(() => {
                  btn.innerText = originalText;
                  btn.classList.remove('bg-green-500', 'text-white', 'border-green-500');
                  btn.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-200');
              }, 1500);
          } else {
              console.error("React cart function not found");
          }
      };
    </script>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
