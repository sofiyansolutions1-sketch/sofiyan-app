<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofiyan Home Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons (Spinner, Check, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      /* Specific class for smaller areas like Time Slot container */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      
      /* Featured Services Auto-Scroll Animation */
      @keyframes scroll {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); } /* Scrolls half the width (original content) */
      }
      .animate-scroll {
          animation: scroll 80s linear infinite;
          width: max-content;
      }
      .animate-scroll:hover {
          animation-play-state: paused; /* Pauses when user hovers to book */
      }
    </style>

</head>
  <body>
    <div id="root"></div>

    <!-- Premium Location Picker Modal -->
    <div id="location-picker-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="bg-indigo-500 p-5 text-white relative">
                <button onclick="closeLocationModal()" class="absolute top-4 right-4 text-white hover:text-gray-200">
                    <i class="fas fa-times text-lg"></i>
                </button>
                <div class="flex items-center space-x-3 mb-1">
                    <div class="bg-white bg-opacity-20 p-2 rounded-full">
                        <i class="fas fa-map-marker-alt text-xl"></i>
                    </div>
                    <h3 class="text-xl font-bold">Choose your Location</h3>
                </div>
                <p class="text-indigo-100 text-xs ml-11">Search for your location or use current location</p>
            </div>
            
            <div class="p-6">
                <div class="relative mb-5">
                    <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="location-search-input" placeholder="Choose your Location" class="w-full border-2 border-indigo-100 rounded-xl pl-10 pr-4 py-3 text-sm outline-none focus:border-indigo-500 transition-colors font-medium text-gray-700" oninput="handleLocationSearch(this.value)">
                    
                    <div id="location-suggestions" class="absolute z-10 w-full bg-white border border-gray-100 shadow-lg rounded-xl mt-1 hidden max-h-48 overflow-y-auto"></div>
                </div>
                
                <button onclick="autoDetectGPS()" class="w-full bg-gray-50 hover:bg-indigo-50 border border-gray-100 rounded-xl p-4 flex items-center space-x-4 transition-colors group">
                    <div class="bg-indigo-100 text-indigo-600 p-3 rounded-full group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                        <i class="fas fa-location-arrow"></i>
                    </div>
                    <div class="text-left">
                        <h4 class="font-bold text-gray-800 group-hover:text-indigo-700">Get Current Location</h4>
                        <p class="text-xs text-gray-500">Using GPS</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Hyper-Local Category Radar Modal -->
    <div id="radar-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl p-6 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-3 mb-3">
                <div>
                    <h3 class="text-xl font-bold text-gray-900">📡 Smart Partner Radar</h3>
                    <p id="radar-lead-info" class="text-xs text-indigo-600 font-semibold mt-1"></p>
                </div>
                <button onclick="closeRadarModal()" class="text-gray-400 hover:text-red-500 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="radar-lead-id">
            <input type="hidden" id="radar-lead-data">
            
            <div class="bg-gray-50 p-3 rounded-lg mb-3 border border-gray-200">
                <label class="text-xs font-bold text-gray-700 block mb-1">Recalculate distance from custom location:</label>
                <div class="flex space-x-2">
                    <input type="text" id="radar-custom-location" placeholder="e.g. Assi Ghat, Varanasi" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-indigo-500">
                    <button onclick="recalculateRadarLocation()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">
                        <i class="fas fa-search-location"></i> Search
                    </button>
                </div>
            </div>

            <div id="radar-loading" class="text-center text-indigo-600 font-bold py-6 hidden">
                <i class="fas fa-radar fa-spin text-3xl mb-2 block"></i> Scanning for exact matches...
            </div>
            <div id="radar-results" class="overflow-y-auto space-y-3 flex-1 pr-1"></div>
        </div>
    </div>

    <script>
      // Helper functions for Radar
      function calculateDistanceKM(lat1, lon1, lat2, lon2) {
          if (!lat1 || !lon1 || !lat2 || !lon2) return null;
          const R = 6371; // Radius of the earth in km
          const dLat = (lat2 - lat1) * (Math.PI / 180);
          const dLon = (lon2 - lon1) * (Math.PI / 180);
          const a = 
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * 
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
          const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
          return R * c; // Distance in km
      }

      async function getCoordinatesFromAddress(address) {
          try {
              const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
              const data = await response.json();
              if (data && data.length > 0) {
                  return {
                      lat: parseFloat(data[0].lat),
                      lng: parseFloat(data[0].lon)
                  };
              }
              return null;
          } catch (error) {
              console.error("Geocoding error:", error);
              return null;
          }
      }

      window.closeRadarModal = function() {
          document.getElementById('radar-modal').classList.add('hidden');
      };

      window.openRadarModal = function(leadId, leadDataEncoded) {
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          document.getElementById('radar-lead-id').value = leadId;
          document.getElementById('radar-lead-data').value = leadDataEncoded;
          document.getElementById('radar-modal').classList.remove('hidden');
          
          // Extract categories from cart items
          let requiredServices = lead.cartItems ? lead.cartItems.map(item => item.name).join(', ') : (lead.subServiceName || 'Unknown');
          document.getElementById('radar-lead-info').innerText = `City: ${lead.city || 'Unknown'} | Services: ${requiredServices}`;
          
          scanPartners(lead.lat, lead.lng, lead.city || '', lead.cartItems || [{name: lead.subServiceName}]);
      };

      window.scanPartners = async function(targetLat, targetLng, targetCity, cartItems) {
          const resultsDiv = document.getElementById('radar-results');
          const loadingDiv = document.getElementById('radar-loading');
          
          resultsDiv.innerHTML = '';
          loadingDiv.classList.remove('hidden');

          if(!targetLat || !targetLng) {
              loadingDiv.classList.add('hidden');
              resultsDiv.innerHTML = '<p class="text-red-500 text-sm font-bold p-4 text-center">❌ GPS location missing for this target.</p>';
              return;
          }

          try {
              // 1. Fetch active partners in the SAME CITY from both tables
              const { data: primaryPartners, error: primaryError } = await window.supabase
                  .from('primary_partners')
                  .select('*')
                  .eq('status', 'available')
                  .ilike('city', `%${targetCity}%`);

              const { data: secondaryPartners, error: secondaryError } = await window.supabase
                  .from('secondary_partners')
                  .select('*')
                  .eq('status', 'available')
                  .ilike('city', `%${targetCity}%`);

              if (primaryError) throw primaryError;
              if (secondaryError) throw secondaryError;

              const allPartners = [
                  ...(primaryPartners || []).map(p => ({...p, partner_type: 'Primary'})),
                  ...(secondaryPartners || []).map(p => ({...p, partner_type: 'Secondary'}))
              ];

              // 2. Filter by Category & Calculate Exact Distance
              let leadServices = cartItems ? cartItems.map(item => (item.name || '').toLowerCase()) : [];
              let qualifiedPartners = [];

              allPartners.forEach(p => {
                  // Check Category Match
                  let isCategoryMatch = false;
                  if (p.categories && Array.isArray(p.categories)) {
                      let pServices = p.categories.map(c => c.toLowerCase()).join(' ');
                      isCategoryMatch = leadServices.some(ls => pServices.includes(ls) || ls.includes(pServices));
                  } else if (p.service_types) {
                      let pServices = p.service_types.toLowerCase();
                      isCategoryMatch = leadServices.some(ls => pServices.includes(ls) || ls.includes(pServices));
                  }
                  
                  // If no specific service listed for partner, consider them a generalist
                  if (!p.categories && !p.service_types) isCategoryMatch = true; 

                  if (isCategoryMatch) {
                      let exactDist = calculateDistanceKM(targetLat, targetLng, p.lat, p.lng);
                      if (exactDist !== null && parseFloat(exactDist) <= 10.0) {
                          p.exact_distance = parseFloat(exactDist);
                          qualifiedPartners.push(p);
                      }
                  }
              });

              // 3. Sort: Primary first, then by exact distance
              qualifiedPartners.sort((a, b) => {
                  if (a.partner_type === 'Primary' && b.partner_type !== 'Primary') return -1;
                  if (a.partner_type !== 'Primary' && b.partner_type === 'Primary') return 1;
                  return a.exact_distance - b.exact_distance;
              });

              loadingDiv.classList.add('hidden');

              // 4. Render UI
              if (qualifiedPartners.length === 0) {
                  resultsDiv.innerHTML = '<p class="text-gray-500 text-sm p-4 text-center font-bold">No exact category matches found within 10km.</p>';
                  return;
              }

              qualifiedPartners.forEach(p => {
                  let badge = p.partner_type === 'Primary' 
                      ? '<span class="bg-indigo-100 text-indigo-800 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider border border-indigo-200"><i class="fas fa-star text-yellow-500 mr-1"></i> Primary</span>'
                      : '<span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider border border-gray-200"><i class="fab fa-google text-blue-500 mr-1"></i> GMB</span>';

                  let skills = p.categories ? p.categories.join(', ') : (p.service_types || 'All Services');
                  let partnerName = p.name || p.first_name || 'Partner';

                  resultsDiv.innerHTML += `
                  <div class="bg-white border ${p.partner_type === 'Primary' ? 'border-indigo-200' : 'border-gray-200'} rounded-xl p-4 shadow-sm hover:shadow-md transition">
                      <div class="flex justify-between items-start">
                          <div>
                              <h4 class="font-bold text-gray-900 text-lg">${partnerName}</h4>
                              <div class="flex items-center space-x-2 mt-1">
                                  ${badge}
                                  <span class="bg-green-100 text-green-800 text-[10px] font-bold px-2 py-0.5 rounded">${p.exact_distance.toFixed(1)} km exact</span>
                              </div>
                              <p class="text-xs text-gray-500 mt-2"><b>Skills:</b> ${skills}</p>
                          </div>
                          <div class="flex flex-col space-y-2">
                              <a href="tel:${p.phone}" class="bg-gray-100 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-gray-200 text-center transition"><i class="fas fa-phone-alt"></i> Call</a>
                          </div>
                      </div>
                      <button onclick="assignPartnerToLead(document.getElementById('radar-lead-id').value, '${p.id}', '${partnerName}', '${p.phone}')" class="w-full mt-3 bg-green-500 text-white font-bold py-2 rounded-lg text-sm hover:bg-green-600 transition shadow-sm">
                          <i class="fab fa-whatsapp mr-1"></i> Assign & Send Details
                      </button>
                  </div>`;
              });

          } catch (e) {
              console.error(e);
              loadingDiv.classList.add('hidden');
              resultsDiv.innerHTML = `<p class="text-red-500 text-sm p-4">Error: ${e.message}</p>`;
          }
      };

      window.recalculateRadarLocation = async function() {
          const query = document.getElementById('radar-custom-location').value.trim();
          const leadDataEncoded = document.getElementById('radar-lead-data').value;
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));

          if (!query) { alert("Please enter a location"); return; }

          const btn = document.querySelector('button[onclick="recalculateRadarLocation()"]');
          const originalText = btn.innerHTML;
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

          try {
              // Geocode the custom typed location
              const coords = await getCoordinatesFromAddress(query + `, ${lead.city || ''}`);
              if (coords) {
                  // Rescan from new coordinates
                  scanPartners(coords.lat, coords.lng, lead.city || '', lead.cartItems || [{name: lead.subServiceName}]);
              } else {
                  alert("Location not found. Please try a different landmark.");
              }
          } catch (e) {
              console.error(e);
          } finally {
              btn.innerHTML = originalText;
          }
      };

      document.addEventListener("DOMContentLoaded", function() {
          // Check sessionStorage instead of localStorage
          const hasSeenLocationModal = sessionStorage.getItem('locationModalSeen');
          
          if (!hasSeenLocationModal) {
              // Add a small delay for a smooth effect
              setTimeout(() => {
                  openLocationModal();
              }, 500);
          }
      });

      window.openLocationModal = function() {
          document.getElementById('location-picker-modal').classList.remove('hidden');
      };

      window.closeLocationModal = function() {
          document.getElementById('location-picker-modal').classList.add('hidden');
          // Mark as seen for this specific browsing session only
          sessionStorage.setItem('locationModalSeen', 'true');
      };

      let locationSearchTimeout = null;

      window.handleLocationSearch = function(query) {
          clearTimeout(locationSearchTimeout);
          const suggestionsBox = document.getElementById('location-suggestions');
          
          if (!query || query.length < 3) {
              suggestionsBox.classList.add('hidden');
              return;
          }

          // Show loading text
          suggestionsBox.innerHTML = '<div class="p-3 text-sm text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Searching...</div>';
          suggestionsBox.classList.remove('hidden');

          // Debounce for 500ms
          locationSearchTimeout = setTimeout(async () => {
              try {
                  // Restrict to India (countrycodes=in)
                  const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=in&limit=5&addressdetails=1`);
                  const data = await response.json();
                  
                  suggestionsBox.innerHTML = '';
                  
                  if (data.length === 0) {
                      suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">No results found</div>';
                      return;
                  }

                  data.forEach(place => {
                      // Make the address look cleaner
                      const cleanAddress = place.display_name.split(',').slice(0, 3).join(', ');
                      
                      const div = document.createElement('div');
                      div.className = "p-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 flex items-start space-x-2 transition";
                      div.innerHTML = `
                          <i class="fas fa-map-pin text-gray-400 mt-1"></i>
                          <div>
                              <p class="text-sm font-bold text-gray-800">${place.name || place.display_name.split(',')[0]}</p>
                              <p class="text-xs text-gray-500">${cleanAddress}</p>
                          </div>
                      `;
                      div.onclick = () => selectLocation(cleanAddress, place.lat, place.lon);
                      suggestionsBox.appendChild(div);
                  });
              } catch (error) {
                  console.error("Search Error:", error);
                  suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">Error fetching results.</div>';
              }
          }, 500);
      };

      window.selectLocation = function(address, lat, lng) {
          // Save to variables/storage
          window.customerSelectedLat = lat;
          window.customerSelectedLng = lng;
          window.customerSelectedAddress = address;
          
          sessionStorage.setItem('userLocation', address);
          window.dispatchEvent(new Event('locationUpdated'));
          
          // Update Header UI
          const headerDisplay = document.getElementById('header-location-display');
          if(headerDisplay) {
              headerDisplay.innerText = address.split(',')[0]; // Show short name in header
          }
          
          // Clear input and close
          document.getElementById('location-search-input').value = '';
          document.getElementById('location-suggestions').classList.add('hidden');
          closeLocationModal();
      };

      window.autoDetectGPS = function() {
          const btnText = document.querySelector('button[onclick="autoDetectGPS()"] h4');
          const originalText = btnText.innerText;
          btnText.innerHTML = 'Locating... <i class="fas fa-spinner fa-spin ml-2"></i>';
          
          if (!navigator.geolocation) {
              alert("Your browser doesn't support GPS location.");
              btnText.innerText = originalText;
              return;
          }

          navigator.geolocation.getCurrentPosition(
              async (position) => {
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;
                  
                  try {
                      // Reverse geocode to get the text address
                      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                      const data = await response.json();
                      
                      const cleanAddress = data.display_name.split(',').slice(0, 3).join(', ');
                      selectLocation(cleanAddress, lat, lng);
                      
                  } catch (error) {
                      alert("Could not fetch address details for your location.");
                      btnText.innerText = originalText;
                  }
              },
              (error) => {
                  console.error("GPS Error:", error);
                  let msg = "Location error.";
                  if (error.code === 1) msg = "You denied location permission. Please allow it in your browser settings.";
                  if (error.code === 2) msg = "Location unavailable. Check your device GPS.";
                  if (error.code === 3) msg = "Request timed out.";
                  alert(msg);
                  btnText.innerText = originalText;
              },
              { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
      };
    </script>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
