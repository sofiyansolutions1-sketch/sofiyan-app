      ::-webkit-scrollbar-thumb {

          0% { transform: translateX(0); }

          animation: scroll 80s linear infinite;

    <script>
      window.calculateWordMatchScore = function(searchQuery, partnerString) {
          if (!searchQuery || !partnerString) return 0;
          
          const stopWords = ['and', 'the', 'for', 'with', 'from', 'that', 'this'];
          const queryWords = searchQuery.toLowerCase()
              .replace(/[^a-z0-9\s]/g, '')
              .split(/\s+/)
              .filter(w => w.length > 2 && !stopWords.includes(w));
              
          const targetString = partnerString.toLowerCase().replace(/[^a-z0-9\s]/g, '');
          
          let score = 0;
          queryWords.forEach(word => {
              if (targetString.includes(word)) score += 1;
          });
          return score;
      };

      window.openMatchModal = function(leadId, leadDataEncoded) {
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          document.getElementById('match-lead-id').value = leadId;
          document.getElementById('match-lead-data').value = leadDataEncoded;
          
          const fullCustAddress = `${lead.customer_address || lead.address || ''} ${lead.city || ''} ${lead.pincode || ''}`;
          document.getElementById('match-customer-address').innerText = `Customer: ${fullCustAddress}`;
          
          // Auto-fill search bar with customer's city as default starting point
          document.getElementById('live-keyword-search').value = lead.city || '';
          
          document.getElementById('text-match-modal').classList.remove('hidden');
          runKeywordMatch();
      };

      window.closeMatchModal = () => document.getElementById('text-match-modal').classList.add('hidden');

      window.runKeywordMatch = async function() {
          const resultsDiv = document.getElementById('match-results');
          const loadingDiv = document.getElementById('match-loading');
          const liveSearchText = document.getElementById('live-keyword-search').value.trim();
          
          const leadDataEncoded = document.getElementById('match-lead-data').value;
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          
          // Search Query: liveSearchText or fallback to customer address
          const queryToMatch = liveSearchText.length > 0 
              ? liveSearchText 
              : `${lead.customer_address || ''} ${lead.city || ''} ${lead.pincode || ''}`;

          resultsDiv.innerHTML = '';
          loadingDiv.classList.remove('hidden');

          try {
              // Fetch Primary and Secondary Partners
              const [primaryResponse, secondaryResponse] = await Promise.all([
                  window.supabase.from('primary_partners').select('*').eq('status', 'available'),
                  window.supabase.from('secondary_partners').select('*').eq('status', 'available')
              ]);
              
              if (primaryResponse.error) throw primaryResponse.error;
              if (secondaryResponse.error) throw secondaryResponse.error;

              // Map and Combine
              const primaryPartners = (primaryResponse.data || []).map(p => ({
                  ...p,
                  display_name: `${p.first_name} ${p.last_name || ''}`.trim(),
                  partner_type: 'Primary'
              }));

              const secondaryPartners = (secondaryResponse.data || []).map(p => ({
                  ...p,
                  display_name: p.name || 'Unknown',
                  partner_type: 'Secondary'
              }));

              const allPartners = [...primaryPartners, ...secondaryPartners];
              let qualifiedPartners = [];

              // Matching
              allPartners.forEach(p => {
                  // Combine city, address, pincode for searching
                  const partnerSearchableString = `${p.address || ''} ${p.city || ''} ${p.pincode || ''}`;
                  
                  let matchScore = window.calculateWordMatchScore(queryToMatch, partnerSearchableString);

                  // Bonus for exact city match
                  const leadCity = (lead.city || '').toLowerCase();
                  const searchCity = liveSearchText.toLowerCase();
                  
                  if((searchCity && p.city && p.city.toLowerCase().includes(searchCity)) || 
                     (!searchCity && leadCity && p.city && p.city.toLowerCase().includes(leadCity))) {
                      matchScore += 10; 
                  }

                  if (matchScore > 0) {
                      p.match_score = matchScore;
                      qualifiedPartners.push(p);
                  }
              });

              // Filter & Sort
              qualifiedPartners.sort((a, b) => {
                  if (b.match_score !== a.match_score) return b.match_score - a.match_score;
                  if (a.partner_type === 'Primary' && b.partner_type !== 'Primary') return -1;
                  if (a.partner_type !== 'Primary' && b.partner_type === 'Primary') return 1;
                  return 0;
              });

              loadingDiv.classList.add('hidden');

              // Render Empty State
              if (qualifiedPartners.length === 0) {
                  resultsDiv.innerHTML = '<p class="text-gray-500 text-sm p-4 text-center font-bold">No partners found matching those keywords.</p>';
                  return;
              }

              // Render Results
              qualifiedPartners.forEach(p => {
                  let badge = p.partner_type === 'Primary' 
                      ? '<span class="bg-indigo-100 text-indigo-800 text-[10px] font-black px-2.5 py-1 rounded uppercase border border-indigo-200 tracking-wider"><i class="fas fa-star text-yellow-500 mr-1"></i> Primary</span>'
                      : '<span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2.5 py-1 rounded uppercase border border-gray-200 tracking-wider">Secondary</span>';

                  let safePartnerName = p.display_name.replace(/'/g, "\\'");
                  let servicesDisplay = (p.categories && Array.isArray(p.categories)) ? p.categories.join(', ') : 'Generalist';

                  resultsDiv.innerHTML += `
                  <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-indigo-300 transition-colors group">
                      <div class="flex justify-between items-start">
                          <div>
                              <div class="flex items-center space-x-2">
                                  <h4 class="font-bold text-gray-900 text-lg">${p.display_name}</h4>
                                  ${badge}
                              </div>
                              <p class="text-xs text-gray-600 mt-1.5"><i class="fas fa-map-marker-alt text-red-500 mr-1.5"></i> ${p.address || ''}, ${p.city || ''} - ${p.pincode || ''}</p>
                              <p class="text-xs text-gray-500 mt-2"><b>Services:</b> ${servicesDisplay}</p>
                          </div>
                          <div class="text-center bg-indigo-50 border border-indigo-100 p-2 rounded-lg">
                              <p class="text-[10px] font-black text-indigo-700 uppercase">Match Score</p>
                              <p class="text-3xl font-black text-indigo-900">${p.match_score}</p>
                          </div>
                      </div>
                      <button onclick="assignPartnerToLead('${lead.id}', '${p.id}', '${safePartnerName}', '${p.phone || ''}')" class="w-full mt-4 bg-green-500 text-white font-bold py-2.5 rounded-lg text-sm hover:bg-green-600 transition shadow-sm group-hover:shadow-lg flex items-center justify-center">
                          <i class="fab fa-whatsapp mr-2 text-base"></i> Assign & Send Details
                      </button>
                  </div>`;
              });

          } catch (e) {
              console.error(e);
              loadingDiv.classList.add('hidden');
              resultsDiv.innerHTML = '<p class="text-red-500 text-sm p-4 text-center">Error loading partners.</p>';
          }
      };

      document.addEventListener("DOMContentLoaded", function() {
          // Check sessionStorage instead of localStorage
          const hasSeenLocationModal = sessionStorage.getItem('locationModalSeen');
          
          if (!hasSeenLocationModal) {
              // Add a small delay for a smooth effect
              setTimeout(() => {

      window.openLocationModal = function() {
          document.getElementById('location-picker-modal').classList.remove('hidden');
      };

      window.closeLocationModal = function() {
          document.getElementById('location-picker-modal').classList.add('hidden');
          // Mark as seen for this specific browsing session only
          sessionStorage.setItem('locationModalSeen', 'true');
      };

      let locationSearchTimeout = null;

      window.handleLocationSearch = function(query) {
          clearTimeout(locationSearchTimeout);
          const suggestionsBox = document.getElementById('location-suggestions');
          
          if (!query || query.length < 3) {
              suggestionsBox.classList.add('hidden');
              return;
          }

          // Show loading text
          suggestionsBox.innerHTML = '<div class="p-3 text-sm text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Searching...</div>';
          suggestionsBox.classList.remove('hidden');

          // Debounce for 500ms
          locationSearchTimeout = setTimeout(async () => {
              try {
                  // Restrict to India (countrycodes=in)
                  const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=in&limit=5&addressdetails=1`);
                  const data = await response.json();
                  
                  suggestionsBox.innerHTML = '';
                  
                  if (data.length === 0) {
                      suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">No results found</div>';
                      return;
                  }

                  data.forEach(place => {
                      // Make the address look cleaner
                      const cleanAddress = place.display_name.split(',').slice(0, 3).join(', ');
                      
                      const div = document.createElement('div');
                      div.className = "p-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 flex items-start space-x-2 transition";
                      div.innerHTML = `
                          <i class="fas fa-map-pin text-gray-400 mt-1"></i>
                          <div>
                              <p class="text-sm font-bold text-gray-800">${place.name || place.display_name.split(',')[0]}</p>
                              <p class="text-xs text-gray-500">${cleanAddress}</p>
                          </div>
                      `;
                      div.onclick = () => selectLocation(cleanAddress);
                      suggestionsBox.appendChild(div);
                  });
              } catch (error) {
                  console.error("Search Error:", error);
                  suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">Error fetching results.</div>';
              }
          }, 500);
      };

      window.selectLocation = function(addressText) {
          // 1. Update the Header UI
          const headerDisplay = document.getElementById('header-location-display');
          if(headerDisplay) headerDisplay.innerText = addressText.split(',')[0];
          
          // 2. ONLY update the CITY input in the checkout form (extract city name)
          const cityInput = document.getElementById('checkout-city'); // Ensure this ID matches your City input
          if(cityInput) {
              // We use the native setter to ensure React picks up the change if it's a controlled component
              const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, "value").set;
              nativeInputValueSetter.call(cityInput, addressText.split(',')[0]);
              cityInput.dispatchEvent(new Event('input', { bubbles: true }));
          }
          
          // Also update session storage and dispatch event for React to pick up
          sessionStorage.setItem('userLocation', addressText);
          window.dispatchEvent(new Event('locationUpdated'));
          
          // 3. Clear the search and close modal
          document.getElementById('location-search-input').value = '';
          document.getElementById('location-suggestions').classList.add('hidden');
          closeLocationModal();
      };

      window.autoDetectGPS = function() {
          const btnText = document.querySelector('button[onclick="autoDetectGPS()"] h4');
          const originalText = btnText.innerText;
          btnText.innerHTML = 'Locating... <i class="fas fa-spinner fa-spin ml-2"></i>';
          
          if (!navigator.geolocation) {
              alert("Your browser doesn't support GPS location.");
              btnText.innerText = originalText;
              return;
          }

          navigator.geolocation.getCurrentPosition(
              async (position) => {
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;
                  
                  try {
                      // Reverse geocode to get the text address
                      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                      const data = await response.json();
                      
                      const cleanAddress = data.display_name.split(',').slice(0, 3).join(', ');
                      selectLocation(cleanAddress);
                      
                  } catch (error) {
                      alert("Could not fetch address details for your location.");
                      btnText.innerText = originalText;
                  }
              },
              (error) => {
                  console.error("GPS Error:", error);
                  let msg = "Location error.";
                  if (error.code === 1) msg = "You denied location permission. Please allow it in your browser settings.";
                  if (error.code === 2) msg = "Location unavailable. Check your device GPS.";
                  if (error.code === 3) msg = "Request timed out.";
                  alert(msg);
                  btnText.innerText = originalText;
              },
              { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
      };

      let currentCategoryView = "";

      window.openCategoryView = function(categoryName) {
          currentCategoryView = categoryName;
          const modal = document.getElementById('full-service-modal');
          const title = document.getElementById('full-modal-title');
          const sidebar = document.getElementById('full-modal-sidebar');
          const content = document.getElementById('full-modal-services-content');

          title.textContent = categoryName;
          sidebar.innerHTML = '';
          content.innerHTML = '';

          const categoryData = window.masterServicesData[categoryName] || window.masterServicesData["Electrician"];
          const subcategories = Object.keys(categoryData);
          
          if (subcategories.length === 0) return;

          // Render Sidebar
          subcategories.forEach((subcat, index) => {
              const btn = document.createElement('button');
              btn.className = `w-full text-left px-4 py-4 border-b border-slate-200 text-sm font-medium transition-colors ${index === 0 ? 'bg-white text-indigo-700 border-l-4 border-l-indigo-600' : 'text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent'}`;
              btn.textContent = subcat;
              btn.onclick = () => {
                  // Update active state
                  Array.from(sidebar.children).forEach(c => {
                      c.className = 'w-full text-left px-4 py-4 border-b border-slate-200 text-sm font-medium transition-colors text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent';
                  });
                  btn.className = 'w-full text-left px-4 py-4 border-b border-slate-200 text-sm font-medium transition-colors bg-white text-indigo-700 border-l-4 border-l-indigo-600';
                  
                  // Scroll to section
                  const section = document.getElementById(`section-${subcat.replace(/\s+/g, '-')}`);
                  if (section) {
                      content.scrollTo({
                          top: section.offsetTop - content.offsetTop,
                          behavior: 'smooth'
                      });
                  }
              };
              sidebar.appendChild(btn);
          });

          // Render Content
          subcategories.forEach(subcat => {
              const section = document.createElement('div');
              section.id = `section-${subcat.replace(/\s+/g, '-')}`;
              section.className = 'mb-8';
              
              const sectionTitle = document.createElement('h3');
              sectionTitle.className = 'font-bold text-lg text-slate-800 mb-4 sticky top-0 bg-slate-50 py-2 z-10';
              sectionTitle.textContent = subcat;
              section.appendChild(sectionTitle);

              const servicesList = document.createElement('div');
              servicesList.className = 'space-y-3';

              categoryData[subcat].forEach(service => {
                  // Generate a unique ID if not present
                  const serviceId = service.id || `${categoryName}-${subcat}-${service.name}`.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
                  
                  let qty = 0;
                  if (window.getReactCart) {
                      const reactCart = window.getReactCart();
                      const item = reactCart.find(i => i.id === serviceId);
                      if (item) qty = item.quantity;
                  }

                  const card = document.createElement('div');
                  card.className = 'bg-white rounded-xl p-4 shadow-sm border border-slate-200 flex justify-between items-center';
                  
                  const originalPriceHtml = service.originalPrice ? `<span class="text-sm text-slate-400 line-through">₹${service.originalPrice}</span>` : '';
                  
                  let buttonHtml = '';
                  if (qty > 0) {
                      buttonHtml = `
                          <div class="flex items-center bg-indigo-50 rounded-lg border border-indigo-200 overflow-hidden h-10">
                              <button onclick="decreaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="w-8 h-full flex items-center justify-center text-indigo-700 font-bold hover:bg-indigo-100 transition-colors">-</button>
                              <span class="w-8 text-center font-bold text-indigo-900 text-sm flex items-center justify-center">${qty}</span>
                              <button onclick="increaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="w-8 h-full flex items-center justify-center text-indigo-700 font-bold hover:bg-indigo-100 transition-colors">+</button>
                          </div>
                      `;
                  } else {
                      buttonHtml = `
                          <button onclick="increaseQty('${serviceId}', ${service.price}, '${service.name.replace(/'/g, "\\'")}', '${categoryName}')" class="px-6 py-2 bg-white border-2 border-indigo-100 text-indigo-700 font-bold rounded-lg hover:bg-indigo-50 shadow-sm transition-colors h-10">
                              ADD
                          </button>
                      `;
                  }

                  card.innerHTML = `
                      <div class="flex-1 pr-4">
                          <h4 class="font-bold text-slate-800 text-base mb-1">${service.name}</h4>
                          <div class="flex items-center gap-2">
                              <span class="font-extrabold text-slate-900">₹${service.price}</span>
                              ${originalPriceHtml}
                          </div>
                      </div>
                      <div class="flex-shrink-0">
                          ${buttonHtml}
                      </div>
                  `;
                  servicesList.appendChild(card);
              });
              
              section.appendChild(servicesList);
              content.appendChild(section);
          });

          // Add scroll spy to update sidebar active state
          content.onscroll = () => {
              let current = '';
              const sections = content.querySelectorAll('div[id^="section-"]');
              sections.forEach(section => {
                  const sectionTop = section.offsetTop - content.offsetTop;
                  if (content.scrollTop >= sectionTop - 60) {
                      current = section.getAttribute('id').replace('section-', '').replace(/-/g, ' ');
                  }
              });
              
              if (current) {
                 Array.from(sidebar.children).forEach(btn => {
                     if (btn.textContent.toLowerCase() === current.toLowerCase()) {
                         btn.className = 'w-full text-left px-4 py-4 border-b border-slate-200 text-sm font-medium transition-colors bg-white text-indigo-700 border-l-4 border-l-indigo-600';
                     } else {
                         btn.className = 'w-full text-left px-4 py-4 border-b border-slate-200 text-sm font-medium transition-colors text-slate-600 hover:bg-slate-50 border-l-4 border-l-transparent';
                     }
                 });
              }
          };

          modal.classList.remove('hidden');
          modal.classList.add('flex');
          document.body.style.overflow = 'hidden';
          window.updateStickyCart();
      };

      window.closeCategoryView = function() {
          const modal = document.getElementById('full-service-modal');
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          document.body.style.overflow = '';
      };

      window.updateStickyCart = function() {
          let totalQty = 0;
          let totalPrice = 0;
          
          if (window.getReactCart) {
              const cartItems = window.getReactCart();
              cartItems.forEach(item => {
                  totalQty += item.quantity;
                  totalPrice += item.price * item.quantity;
              });
          }

          const bottomBar = document.getElementById('full-modal-bottom-bar');
          const priceEl = document.getElementById('full-modal-total-price');
          const countEl = document.getElementById('full-modal-cart-count');
          const itemsEl = document.getElementById('full-modal-total-items');

          if (totalQty > 0) {
              bottomBar.classList.remove('hidden');
              priceEl.textContent = '₹' + totalPrice;
              if (itemsEl) itemsEl.textContent = totalQty + (totalQty === 1 ? ' item' : ' items');
              countEl.textContent = totalQty;
              countEl.classList.remove('hidden');
          } else {
              bottomBar.classList.add('hidden');
              countEl.classList.add('hidden');
          }
      };

      window.increaseQty = function(id, price, name, categoryName) {
          if (window.addServiceToCart) {
              window.addServiceToCart(id, name, price, categoryName);
          } else if (window.updateReactCartQuantity) {
              window.updateReactCartQuantity(id, 1);
          }
          
          // Re-render to update buttons, preserving scroll
          setTimeout(() => {
              if (currentCategoryView) {
                  const content = document.getElementById('full-modal-services-content');
                  const scrollTop = content ? content.scrollTop : 0;
                  window.openCategoryView(currentCategoryView);
                  if (content) {
                      document.getElementById('full-modal-services-content').scrollTop = scrollTop;
                  }
              }
          }, 50);
      };

      window.decreaseQty = function(id, price, name, categoryName) {
          if (window.updateReactCartQuantity) {
              window.updateReactCartQuantity(id, -1);
          }
          
          // Re-render to update buttons, preserving scroll
          setTimeout(() => {
              if (currentCategoryView) {
                  const content = document.getElementById('full-modal-services-content');
                  const scrollTop = content ? content.scrollTop : 0;
                  window.openCategoryView(currentCategoryView);
                  if (content) {
                      document.getElementById('full-modal-services-content').scrollTop = scrollTop;
                  }
              }
          }, 50);
      };

      window.proceedToCheckout = function() {
          window.closeCategoryView();
          
          if (window.openReactCheckout) {
              window.openReactCheckout();
          } else {
              window.dispatchEvent(new Event('openCheckout'));
          }
      };

      // Expose sync function for React to call when cart changes externally
      window.syncVanillaCartUI = function() {
          if (!document.getElementById('full-service-modal').classList.contains('hidden')) {
              window.updateStickyCart();
              if (currentCategoryView) {
                  const content = document.getElementById('full-modal-services-content');
                  const scrollTop = content ? content.scrollTop : 0;
                  window.openCategoryView(currentCategoryView);
                  if (content) {
                      document.getElementById('full-modal-services-content').scrollTop = scrollTop;
                  }
              }
          }
      };
      
      // Remove old unused functions to avoid errors
      window.openCategoryModal = function(name) { window.openCategoryView(name); };
      window.closeCategoryModal = function() { window.closeCategoryView(); };
      window.openCartSidebar = function() { window.proceedToCheckout(); };
      window.closeCartSidebar = function() {};
      window.renderCartSidebar = function() {};
    </script>

    <script type="module" src="./index.tsx"></script>
