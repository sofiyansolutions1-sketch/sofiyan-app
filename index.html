<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sofiyan Home Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons (Spinner, Check, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      /* Specific class for smaller areas like Time Slot container */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      
      /* Featured Services Auto-Scroll Animation */
      @keyframes scroll {
          0% { transform: translateX(0); }
          100% { transform: translateX(-50%); } /* Scrolls half the width (original content) */
      }
      .animate-scroll {
          animation: scroll 80s linear infinite;
          width: max-content;
      }
      .animate-scroll:hover {
          animation-play-state: paused; /* Pauses when user hovers to book */
      }
    </style>

</head>
  <body>
    <div id="root"></div>

    <!-- Premium Location Picker Modal -->
    <div id="location-picker-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="bg-indigo-500 p-5 text-white relative">
                <button onclick="closeLocationModal()" class="absolute top-4 right-4 text-white hover:text-gray-200">
                    <i class="fas fa-times text-lg"></i>
                </button>
                <div class="flex items-center space-x-3 mb-1">
                    <div class="bg-white bg-opacity-20 p-2 rounded-full">
                        <i class="fas fa-map-marker-alt text-xl"></i>
                    </div>
                    <h3 class="text-xl font-bold">Choose your Location</h3>
                </div>
                <p class="text-indigo-100 text-xs ml-11">Search for your location or use current location</p>
            </div>
            
            <div class="p-6">
                <div class="relative mb-5">
                    <i class="fas fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="location-search-input" placeholder="Choose your Location" class="w-full border-2 border-indigo-100 rounded-xl pl-10 pr-4 py-3 text-sm outline-none focus:border-indigo-500 transition-colors font-medium text-gray-700" oninput="handleLocationSearch(this.value)">
                    
                    <div id="location-suggestions" class="absolute z-10 w-full bg-white border border-gray-100 shadow-lg rounded-xl mt-1 hidden max-h-48 overflow-y-auto"></div>
                </div>
                
                <button onclick="autoDetectGPS()" class="w-full bg-gray-50 hover:bg-indigo-50 border border-gray-100 rounded-xl p-4 flex items-center space-x-4 transition-colors group">
                    <div class="bg-indigo-100 text-indigo-600 p-3 rounded-full group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                        <i class="fas fa-location-arrow"></i>
                    </div>
                    <div class="text-left">
                        <h4 class="font-bold text-gray-800 group-hover:text-indigo-700">Get Current Location</h4>
                        <p class="text-xs text-gray-500">Using GPS</p>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Smart Address Matcher Modal -->
    <div id="text-match-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl p-6 max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center border-b pb-3 mb-3">
                <div>
                    <h3 class="text-xl font-bold text-gray-900">🔍 Smart Address Matcher</h3>
                    <p id="match-customer-address" class="text-xs text-indigo-600 font-semibold mt-1"></p>
                </div>
                <button onclick="closeMatchModal()" class="text-gray-400 hover:text-red-500 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="match-lead-id">
            <input type="hidden" id="match-lead-data">
            
            <div class="bg-indigo-50 p-3 rounded-lg mb-3 border border-indigo-100">
                <label class="text-xs font-bold text-indigo-800 block mb-1">Live Filter (Type Area, City, or Pincode):</label>
                <div class="relative">
                    <i class="fas fa-keyboard absolute left-3 top-2.5 text-indigo-400"></i>
                    <input type="text" id="live-keyword-search" onkeyup="runKeywordMatch()" placeholder="e.g. Mau, Ghosi, 275304..." class="w-full border border-indigo-200 rounded-lg pl-9 pr-3 py-2 text-sm outline-none focus:border-indigo-500 font-medium">
                </div>
            </div>

            <div id="match-loading" class="text-center text-indigo-600 font-bold py-6 hidden">
                <i class="fas fa-sync fa-spin text-3xl mb-2 block"></i> Matching words...
            </div>
            <div id="match-results" class="overflow-y-auto space-y-3 flex-1 pr-1"></div>
        </div>
    </div>

    <script>
      window.calculateWordMatchScore = function(searchQuery, partnerString) {
          if (!searchQuery || !partnerString) return 0;
          
          const queryWords = searchQuery.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 2);
          const targetString = partnerString.toLowerCase().replace(/[^a-z0-9\s]/g, '');
          
          let score = 0;
          queryWords.forEach(word => {
              if (targetString.includes(word)) score += 1;
          });
          return score;
      };

      window.openMatchModal = function(leadId, leadDataEncoded) {
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          document.getElementById('match-lead-id').value = leadId;
          document.getElementById('match-lead-data').value = leadDataEncoded;
          
          const fullCustAddress = `${lead.customer_address || lead.address || ''} ${lead.city || ''} ${lead.pincode || ''}`;
          document.getElementById('match-customer-address').innerText = `Customer: ${fullCustAddress}`;
          
          // Auto-fill search bar with customer's city as default starting point
          document.getElementById('live-keyword-search').value = lead.city || '';
          
          document.getElementById('text-match-modal').classList.remove('hidden');
          runKeywordMatch();
      };

      window.closeMatchModal = () => document.getElementById('text-match-modal').classList.add('hidden');

      window.runKeywordMatch = async function() {
          const resultsDiv = document.getElementById('match-results');
          const loadingDiv = document.getElementById('match-loading');
          const liveSearchText = document.getElementById('live-keyword-search').value.trim();
          
          const leadDataEncoded = document.getElementById('match-lead-data').value;
          const lead = JSON.parse(decodeURIComponent(leadDataEncoded));
          let requiredServices = [];
          if (lead.cart_items && Array.isArray(lead.cart_items)) {
              requiredServices = lead.cart_items.map(item => item.name.toLowerCase());
          } else if (lead.cartItems && Array.isArray(lead.cartItems)) {
              requiredServices = lead.cartItems.map(item => item.name.toLowerCase());
          }

          // If search bar is empty, use the customer's full address as the search query
          const queryToMatch = liveSearchText.length > 0 ? liveSearchText : `${lead.customer_address || lead.address || ''} ${lead.city || ''} ${lead.pincode || ''}`;

          resultsDiv.innerHTML = '';
          loadingDiv.classList.remove('hidden');

          try {
              // Fetch ALL active partners from both tables
              const { data: primaryPartners, error: primaryError } = await window.supabase.from('primary_partners').select('*').eq('status', 'available');
              const { data: secondaryPartners, error: secondaryError } = await window.supabase.from('secondary_partners').select('*').eq('status', 'available');
              
              if (primaryError) throw primaryError;
              if (secondaryError) throw secondaryError;

              const partners = [
                  ...(primaryPartners || []).map(p => ({...p, partner_type: 'Primary'})),
                  ...(secondaryPartners || []).map(p => ({...p, partner_type: 'Secondary', first_name: p.name, service_types: (p.categories && Array.isArray(p.categories)) ? p.categories.join(', ') : ''}))
              ];

              let qualifiedPartners = [];

              partners.forEach(p => {
                  // 1. Service Category Match (Optional but recommended)
                  let isCategoryMatch = true;
                  if (p.service_types && requiredServices.length > 0) {
                      let pServices = p.service_types.toLowerCase();
                      isCategoryMatch = requiredServices.some(ls => pServices.includes(ls) || ls.includes(pServices));
                  } else if (p.categories && Array.isArray(p.categories) && requiredServices.length > 0) {
                      let pServices = p.categories.map(c => c.toLowerCase()).join(' ');
                      isCategoryMatch = requiredServices.some(ls => pServices.includes(ls) || ls.includes(pServices));
                  }
                  
                  // 2. Keyword Match Score
                  const partnerFullText = `${p.first_name || p.name || ''} ${p.address || ''} ${p.city || ''} ${p.pincode || ''}`;
                  let matchScore = calculateWordMatchScore(queryToMatch, partnerFullText);

                  if (isCategoryMatch && matchScore > 0) {
                      p.match_score = matchScore;
                      qualifiedPartners.push(p);
                  }
              });

              // Sort: Highest Match Score first, then Primary over Secondary
              qualifiedPartners.sort((a, b) => {
                  if (b.match_score !== a.match_score) return b.match_score - a.match_score;
                  if (a.partner_type === 'Primary' && b.partner_type !== 'Primary') return -1;
                  if (a.partner_type !== 'Primary' && b.partner_type === 'Primary') return 1;
                  return 0;
              });

              loadingDiv.classList.add('hidden');

              if (qualifiedPartners.length === 0) {
                  resultsDiv.innerHTML = '<p class="text-gray-500 text-sm p-4 text-center font-bold">No partners found matching those keywords.</p>';
                  return;
              }

              // Render UI
              qualifiedPartners.forEach(p => {
                  let badge = p.partner_type === 'Primary' 
                      ? '<span class="bg-indigo-100 text-indigo-800 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider"><i class="fas fa-star text-yellow-500"></i> Primary</span>'
                      : '<span class="bg-gray-100 text-gray-600 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-wider">GMB</span>';

                  let partnerName = p.first_name || p.name || 'Partner';

                  let safePartnerName = partnerName.replace(/'/g, "\\'");

                  resultsDiv.innerHTML += `
                  <div class="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:border-indigo-300 transition">
                      <div class="flex justify-between items-start">
                          <div>
                              <h4 class="font-bold text-gray-900 text-lg">${partnerName} ${badge}</h4>
                              <p class="text-xs text-gray-600 mt-1"><i class="fas fa-map-marker-alt text-red-500 mr-1"></i> ${p.address || ''}, ${p.city || ''} - ${p.pincode || ''}</p>
                              <p class="text-[10px] font-bold text-green-600 mt-1 bg-green-50 inline-block px-2 py-0.5 rounded border border-green-100">🔥 Match Score: ${p.match_score}</p>
                          </div>
                      </div>
                      <button onclick="assignPartnerToLead('${lead.id}', '${p.id}', '${safePartnerName}', '${p.phone || ''}')" class="w-full mt-3 bg-green-500 text-white font-bold py-2 rounded-lg text-sm hover:bg-green-600 transition shadow-sm">
                          <i class="fab fa-whatsapp mr-1"></i> Assign & Send Details
                      </button>
                  </div>`;
              });

          } catch (e) {
              console.error(e);
              loadingDiv.classList.add('hidden');
              resultsDiv.innerHTML = `<p class="text-red-500 text-sm p-4">Error: ${e.message}</p>`;
          }
      };

      document.addEventListener("DOMContentLoaded", function() {
          // Check sessionStorage instead of localStorage
          const hasSeenLocationModal = sessionStorage.getItem('locationModalSeen');
          
          if (!hasSeenLocationModal) {
              // Add a small delay for a smooth effect
              setTimeout(() => {
                  openLocationModal();
              }, 500);
          }
      });

      window.openLocationModal = function() {
          document.getElementById('location-picker-modal').classList.remove('hidden');
      };

      window.closeLocationModal = function() {
          document.getElementById('location-picker-modal').classList.add('hidden');
          // Mark as seen for this specific browsing session only
          sessionStorage.setItem('locationModalSeen', 'true');
      };

      let locationSearchTimeout = null;

      window.handleLocationSearch = function(query) {
          clearTimeout(locationSearchTimeout);
          const suggestionsBox = document.getElementById('location-suggestions');
          
          if (!query || query.length < 3) {
              suggestionsBox.classList.add('hidden');
              return;
          }

          // Show loading text
          suggestionsBox.innerHTML = '<div class="p-3 text-sm text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i>Searching...</div>';
          suggestionsBox.classList.remove('hidden');

          // Debounce for 500ms
          locationSearchTimeout = setTimeout(async () => {
              try {
                  // Restrict to India (countrycodes=in)
                  const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=in&limit=5&addressdetails=1`);
                  const data = await response.json();
                  
                  suggestionsBox.innerHTML = '';
                  
                  if (data.length === 0) {
                      suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">No results found</div>';
                      return;
                  }

                  data.forEach(place => {
                      // Make the address look cleaner
                      const cleanAddress = place.display_name.split(',').slice(0, 3).join(', ');
                      
                      const div = document.createElement('div');
                      div.className = "p-3 hover:bg-indigo-50 cursor-pointer border-b border-gray-100 flex items-start space-x-2 transition";
                      div.innerHTML = `
                          <i class="fas fa-map-pin text-gray-400 mt-1"></i>
                          <div>
                              <p class="text-sm font-bold text-gray-800">${place.name || place.display_name.split(',')[0]}</p>
                              <p class="text-xs text-gray-500">${cleanAddress}</p>
                          </div>
                      `;
                      div.onclick = () => selectLocation(cleanAddress, place.lat, place.lon);
                      suggestionsBox.appendChild(div);
                  });
              } catch (error) {
                  console.error("Search Error:", error);
                  suggestionsBox.innerHTML = '<div class="p-3 text-sm text-red-500">Error fetching results.</div>';
              }
          }, 500);
      };

      window.selectLocation = function(address, lat, lng) {
          // Save to variables/storage
          window.customerSelectedLat = lat;
          window.customerSelectedLng = lng;
          window.customerSelectedAddress = address;
          
          sessionStorage.setItem('userLocation', address);
          window.dispatchEvent(new Event('locationUpdated'));
          
          // Update Header UI
          const headerDisplay = document.getElementById('header-location-display');
          if(headerDisplay) {
              headerDisplay.innerText = address.split(',')[0]; // Show short name in header
          }
          
          // Clear input and close
          document.getElementById('location-search-input').value = '';
          document.getElementById('location-suggestions').classList.add('hidden');
          closeLocationModal();
      };

      window.autoDetectGPS = function() {
          const btnText = document.querySelector('button[onclick="autoDetectGPS()"] h4');
          const originalText = btnText.innerText;
          btnText.innerHTML = 'Locating... <i class="fas fa-spinner fa-spin ml-2"></i>';
          
          if (!navigator.geolocation) {
              alert("Your browser doesn't support GPS location.");
              btnText.innerText = originalText;
              return;
          }

          navigator.geolocation.getCurrentPosition(
              async (position) => {
                  const lat = position.coords.latitude;
                  const lng = position.coords.longitude;
                  
                  try {
                      // Reverse geocode to get the text address
                      const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                      const data = await response.json();
                      
                      const cleanAddress = data.display_name.split(',').slice(0, 3).join(', ');
                      selectLocation(cleanAddress, lat, lng);
                      
                  } catch (error) {
                      alert("Could not fetch address details for your location.");
                      btnText.innerText = originalText;
                  }
              },
              (error) => {
                  console.error("GPS Error:", error);
                  let msg = "Location error.";
                  if (error.code === 1) msg = "You denied location permission. Please allow it in your browser settings.";
                  if (error.code === 2) msg = "Location unavailable. Check your device GPS.";
                  if (error.code === 3) msg = "Request timed out.";
                  alert(msg);
                  btnText.innerText = originalText;
              },
              { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
          );
      };
    </script>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
